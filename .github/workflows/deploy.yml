name: Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  id-token: write   # OIDC token for AWS
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          GROQ_API_KEY: fake-key
          TAVILY_API_KEY: fake-key
          PYTHONPATH: src

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/news-analyst-agent:$IMAGE_TAG \
                        -t $ECR_REGISTRY/news-analyst-agent:latest .
          docker push $ECR_REGISTRY/news-analyst-agent:$IMAGE_TAG
          docker push $ECR_REGISTRY/news-analyst-agent:latest

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name news-analyst-agent \
            --image-uri $ECR_REGISTRY/news-analyst-agent:$IMAGE_TAG \
            --region us-east-2
